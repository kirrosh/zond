name: fb-loop nightly (Sentry)

# ARV-128 (m-19): nightly feedback-loop run that replays the manual
# audit cycle against Sentry's public API and surfaces zond-side
# regressions before they reach the user.
#
# What it does:
#   1. Builds zond from source (same pipeline as CI).
#   2. Registers the Sentry collection and prepares fixtures.
#   3. Runs the full audit macro and dumps the JSON envelope.
#   4. Compares the produced findings against the baseline snapshot at
#      .github/baselines/sentry-baseline.json and fails the job with
#      a digestible annotation if any new HIGH finding whose
#      `recommended_action != report_backend_bug` shows up — that's
#      the "zond-side" regression signal (an upstream Sentry bug would
#      flip the action to `report_backend_bug` and is filtered out).
#
# Secrets required (Settings → Secrets and variables → Actions):
#   - SENTRY_TOKEN   — Sentry auth token with read scope on the org.
#   - SENTRY_ORG     — Sentry org slug (e.g. `sentry`).
#   - SENTRY_PROJECT — Sentry project slug used as the audit target.
#
# Manual trigger: workflow_dispatch from the GitHub UI or `gh workflow
# run fb-loop-nightly.yml`. Use this after refreshing the baseline.

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  fb-loop:
    name: Audit Sentry & diff baseline
    runs-on: ubuntu-latest
    # The schedule run is harmless without secrets — bail early instead
    # of failing the job on a misleading `prepare-fixtures` 401. When
    # the org adds the three secrets the job becomes meaningful.
    if: ${{ github.event_name == 'workflow_dispatch' || github.repository == 'kirrotech/zond' }}

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"

      - run: bun install

      - name: Build zond
        run: bun run build

      - name: Register Sentry API
        env:
          SENTRY_TOKEN: ${{ secrets.SENTRY_TOKEN }}
        run: |
          set -euo pipefail
          ./dist/zond add api sentry \
            --spec https://docs.sentry.io/api/openapi.json \
            --base-url https://sentry.io \
            --auth-bearer "$SENTRY_TOKEN" \
            --json

      - name: Prepare fixtures
        env:
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          set -euo pipefail
          ./dist/zond prepare-fixtures --api sentry --cascade --seed --apply --json

      - name: Run audit
        run: |
          set -euo pipefail
          ./dist/zond audit --api sentry --with-mass-assignment --with-security --json \
            > audit.json

      - name: Diff against baseline
        run: |
          set -euo pipefail
          bun run .github/scripts/fb-loop-diff.ts \
            --current audit.json \
            --baseline .github/baselines/sentry-baseline.json

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fb-loop-nightly-${{ github.run_number }}
          path: |
            audit.json
            audit-report.html
          if-no-files-found: ignore
