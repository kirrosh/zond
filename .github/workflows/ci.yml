name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"

      - run: bun install

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Tests (unit)
        run: |
          set +e
          bun run test:unit
          ec=$?
          echo "::notice::test:unit exit code = $ec"
          exit $ec

      - name: Tests (mocked)
        run: |
          set +e
          bun run test:mocked
          ec=$?
          echo "::notice::test:mocked exit code = $ec"
          exit $ec

      - name: Build
        run: bun run build
