name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"

      - run: bun install

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Tests (chunked diagnostic)
        run: |
          set +e
          run() {
            bun test "$@" >/dev/null 2>&1
            echo "::notice::exit=$? args=$*"
          }
          run tests/db/
          run tests/parser/
          run tests/runner/
          run tests/generator/
          run tests/core/
          run tests/diagnostics/
          for f in tests/cli/program.test.ts tests/cli/cli-smoke.test.ts tests/cli/completions.test.ts tests/cli/ci-init.test.ts tests/cli/commands.test.ts tests/cli/safe-run.test.ts tests/cli/json-envelope.test.ts tests/cli/describe.test.ts tests/cli/catalog.test.ts tests/cli/db.test.ts tests/cli/request.test.ts tests/cli/init.test.ts tests/cli/init/agents-md.test.ts tests/cli/init/bootstrap.test.ts tests/cli/use.test.ts tests/cli/guide.test.ts tests/cli/update.test.ts; do
            run "$f"
          done
          run tests/cli/serve.test.ts
          run tests/integration/
          run tests/web/
          run tests/reporter/

      - name: Build
        run: bun run build
