name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            bun_target: bun-linux-x64
            artifact: zond
            archive: tar.gz
            raw: zond-linux-x64
          - os: ubuntu-latest
            target: linux-arm64
            bun_target: bun-linux-arm64
            artifact: zond
            archive: tar.gz
            raw: zond-linux-arm64
          - os: macos-latest
            target: darwin-arm64
            bun_target: bun-darwin-arm64
            artifact: zond
            archive: tar.gz
            raw: zond-darwin-arm64
          - os: macos-latest
            target: darwin-x64
            bun_target: bun-darwin-x64
            artifact: zond
            archive: tar.gz
            raw: zond-darwin-x64
          - os: windows-latest
            target: win-x64
            bun_target: bun-windows-x64
            artifact: zond.exe
            archive: zip
            raw: zond-win-x64.exe

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"

      - run: bun install

      - name: Build binary
        run: bun build --compile --target=${{ matrix.bun_target }} src/cli/index.ts --outfile zond

      - name: Codesign (darwin adhoc)
        if: startsWith(matrix.target, 'darwin')
        run: bun run scripts/codesign-darwin.ts ./zond

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: tar -czf zond-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: Compress-Archive -Path ${{ matrix.artifact }} -DestinationPath zond-${{ matrix.target }}.zip

      - name: Raw binary (for npm postinstall)
        run: cp ${{ matrix.artifact }} ${{ matrix.raw }}

      - uses: actions/upload-artifact@v7
        with:
          name: zond-${{ matrix.target }}
          path: |
            zond-${{ matrix.target }}.${{ matrix.archive }}
            ${{ matrix.raw }}

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Checksums
        run: sha256sum zond-* > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            zond-*
            checksums.txt

      # Bump the homebrew tap (kirrosh/homebrew-tap). TAP_GITHUB_TOKEN is a
      # fine-grained PAT with contents:write on that repo. The brew channel
      # is deferred until first users (ARV-387) — without the secret this
      # step self-skips so the release stays green.
      - name: Bump homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "TAP_GITHUB_TOKEN not set — skipping brew bump (channel deferred, ARV-387)"
            exit 0
          fi
          node scripts/release/generate-brew-formula.mjs "${GITHUB_REF_NAME#v}" checksums.txt > zond.rb
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/kirrosh/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp zond.rb tap/Formula/zond.rb
          cd tap
          git config user.name "zond-release"
          git config user.email "noreply@github.com"
          git add Formula/zond.rb
          git diff --cached --quiet || git commit -m "zond ${GITHUB_REF_NAME}"
          git push

  publish:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # The npm package is launcher + postinstall only — nothing to build here.
      - run: npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
