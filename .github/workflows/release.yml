name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            artifact: apitool
            archive: tar.gz
          - os: macos-latest
            target: darwin-arm64
            artifact: apitool
            archive: tar.gz
          - os: windows-latest
            target: win-x64
            artifact: apitool.exe
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build binary
        run: bun build --compile src/cli/index.ts --outfile apitool

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: tar -czf apitool-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: Compress-Archive -Path ${{ matrix.artifact }} -DestinationPath apitool-${{ matrix.target }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: apitool-${{ matrix.target }}
          path: apitool-${{ matrix.target }}.${{ matrix.archive }}

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            apitool-linux-x64.tar.gz
            apitool-darwin-arm64.tar.gz
            apitool-win-x64.zip

  publish:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
