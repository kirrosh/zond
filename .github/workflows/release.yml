name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            bun_target: bun-linux-x64
            artifact: zond
            archive: tar.gz
            raw: zond-linux-x64
          - os: ubuntu-latest
            target: linux-arm64
            bun_target: bun-linux-arm64
            artifact: zond
            archive: tar.gz
            raw: zond-linux-arm64
          - os: macos-latest
            target: darwin-arm64
            bun_target: bun-darwin-arm64
            artifact: zond
            archive: tar.gz
            raw: zond-darwin-arm64
          - os: macos-latest
            target: darwin-x64
            bun_target: bun-darwin-x64
            artifact: zond
            archive: tar.gz
            raw: zond-darwin-x64
          - os: windows-latest
            target: win-x64
            bun_target: bun-windows-x64
            artifact: zond.exe
            archive: zip
            raw: zond-win-x64.exe

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"

      - run: bun install

      - name: Build binary
        run: bun build --compile --target=${{ matrix.bun_target }} src/cli/index.ts --outfile zond

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: tar -czf zond-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: Compress-Archive -Path ${{ matrix.artifact }} -DestinationPath zond-${{ matrix.target }}.zip

      - name: Raw binary (for npm postinstall)
        run: cp ${{ matrix.artifact }} ${{ matrix.raw }}

      - uses: actions/upload-artifact@v7
        with:
          name: zond-${{ matrix.target }}
          path: |
            zond-${{ matrix.target }}.${{ matrix.archive }}
            ${{ matrix.raw }}

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Checksums
        run: sha256sum zond-* > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            zond-*
            checksums.txt

  publish:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # The npm package is launcher + postinstall only — nothing to build here.
      - run: npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
