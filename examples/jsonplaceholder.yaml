name: JSONPlaceholder CRUD
base_url: https://jsonplaceholder.typicode.com

tests:
  - name: "Get post by ID"
    GET: /posts/1
    expect:
      status: 200
      body:
        id: { equals: 1, type: integer }
        title: { type: string }
        userId: { type: integer }

  - name: "Create post"
    POST: /posts
    json:
      title: "{{$randomString}}"
      body: "Test body content"
      userId: 1
    expect:
      status: 201
      body:
        id: { capture: post_id, type: integer }
        title: { type: string }

  - name: "List posts"
    GET: /posts
    query:
      _limit: "5"
    expect:
      status: 200

  - name: "Get users"
    GET: /users/1
    expect:
      status: 200
      body:
        id: { equals: 1 }
        name: { type: string }
        email: { type: string, matches: ".+@.+" }
